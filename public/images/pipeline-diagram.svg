<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 620" font-family="Inter, system-ui, sans-serif">
  <style>
    .box { fill: #FFFFFF; stroke: #2C2C2C; stroke-width: 1.5; rx: 6; }
    .box-stop { fill: #FFFFFF; stroke: #8C6239; stroke-width: 1.5; rx: 6; }
    .label { font-size: 13px; fill: #2C2C2C; text-anchor: middle; font-weight: 500; }
    .label-stop { font-size: 11.5px; fill: #8C6239; text-anchor: start; font-weight: 400; }
    .arrow { stroke: #2C2C2C; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-stop { stroke: #8C6239; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-stop); }
    .output-label { font-size: 11px; fill: #6B6B6B; text-anchor: middle; font-weight: 400; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2C2C2C"/>
    </marker>
    <marker id="arrowhead-stop" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#8C6239"/>
    </marker>
  </defs>

  <!-- Step 1: Upload PDF -->
  <rect class="box" x="180" y="20" width="200" height="38"/>
  <text class="label" x="280" y="44">Upload PDF</text>

  <!-- Arrow -->
  <line class="arrow" x1="280" y1="58" x2="280" y2="82"/>

  <!-- Step 2: Extract Text -->
  <rect class="box" x="180" y="82" width="200" height="38"/>
  <text class="label" x="280" y="106">Extract Text</text>

  <!-- Arrow down + branch right -->
  <line class="arrow" x1="280" y1="120" x2="280" y2="168"/>
  <line class="arrow-stop" x1="380" y1="101" x2="440" y2="101"/>
  <text class="label-stop" x="448" y="105">Scanned document</text>

  <!-- Step 3: Normalize Text -->
  <rect class="box" x="180" y="168" width="200" height="38"/>
  <text class="label" x="280" y="192">Normalize Text</text>

  <!-- Arrow -->
  <line class="arrow" x1="280" y1="206" x2="280" y2="254"/>

  <!-- Step 4: Classify Document (LLM) -->
  <rect class="box" x="160" y="254" width="240" height="38"/>
  <text class="label" x="280" y="278">Classify Document (LLM)</text>

  <!-- Arrow down + branch right -->
  <line class="arrow" x1="280" y1="292" x2="280" y2="340"/>
  <line class="arrow-stop" x1="400" y1="273" x2="440" y2="273"/>
  <text class="label-stop" x="448" y="277">Not a contract</text>

  <!-- Step 5: Chunk Text -->
  <rect class="box" x="180" y="340" width="200" height="38"/>
  <text class="label" x="280" y="364">Chunk Text</text>

  <!-- Arrow -->
  <line class="arrow" x1="280" y1="378" x2="280" y2="416"/>

  <!-- Step 6: Analyze Chunks (LLM) -->
  <rect class="box" x="160" y="416" width="240" height="38"/>
  <text class="label" x="280" y="440">Analyze Chunks (LLM)</text>

  <!-- Arrow -->
  <line class="arrow" x1="280" y1="454" x2="280" y2="492"/>

  <!-- Step 7: Merge Results -->
  <rect class="box" x="180" y="492" width="200" height="38"/>
  <text class="label" x="280" y="516">Merge Results</text>

  <!-- Arrow -->
  <line class="arrow" x1="280" y1="530" x2="280" y2="562"/>

  <!-- Step 8: Structured Output -->
  <rect class="box" x="140" y="562" width="280" height="42"/>
  <text class="label" x="280" y="580">Structured Output</text>
  <text class="output-label" x="280" y="597">parties, clauses, obligations, risks</text>
</svg>
